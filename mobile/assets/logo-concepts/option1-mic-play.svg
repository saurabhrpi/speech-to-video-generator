<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="roundedSquare">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>
  <g clip-path="url(#roundedSquare)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="#000000"/>

    <!-- Microphone body -->
    <rect x="390" y="200" width="120" height="220" rx="60" ry="60" fill="none" stroke="#ffffff" stroke-width="32"/>

    <!-- Mic stand arc -->
    <path d="M330 380 Q330 510 450 510 Q570 510 570 380" fill="none" stroke="#ffffff" stroke-width="32" stroke-linecap="round"/>

    <!-- Mic stand -->
    <line x1="450" y1="510" x2="450" y2="590" stroke="#ffffff" stroke-width="32" stroke-linecap="round"/>

    <!-- Mic base -->
    <line x1="380" y1="590" x2="520" y2="590" stroke="#ffffff" stroke-width="32" stroke-linecap="round"/>

    <!-- Arrow / transition -->
    <line x1="500" y1="440" x2="590" y2="440" stroke="#ffffff" stroke-width="24" stroke-linecap="round" opacity="0.5"/>
    <polyline points="570,420 595,440 570,460" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

    <!-- Play triangle -->
    <polygon points="620,340 620,540 780,440" fill="#ffffff" stroke="none"/>

    <!-- Label -->
    <text x="512" y="750" text-anchor="middle" fill="#ffffff" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="72" font-weight="600" letter-spacing="6">SPEECH</text>
    <text x="512" y="830" text-anchor="middle" fill="#ffffff" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="48" font-weight="300" letter-spacing="4" opacity="0.6">TO VIDEO</text>
  </g>
</svg>