<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="roundedSquare">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>
  <g clip-path="url(#roundedSquare)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="#000000"/>

    <!-- Audio waveform bars (left side, morphing into film frames on right) -->
    <!-- Waveform bars -->
    <rect x="140" y="390" width="28" height="120" rx="14" fill="#ffffff" opacity="0.5"/>
    <rect x="190" y="340" width="28" height="220" rx="14" fill="#ffffff" opacity="0.6"/>
    <rect x="240" y="290" width="28" height="320" rx="14" fill="#ffffff" opacity="0.7"/>
    <rect x="290" y="310" width="28" height="280" rx="14" fill="#ffffff" opacity="0.8"/>
    <rect x="340" y="350" width="28" height="200" rx="14" fill="#ffffff" opacity="0.85"/>

    <!-- Transition zone - bars becoming rectangular -->
    <rect x="400" y="320" width="32" height="260" rx="8" fill="#ffffff" opacity="0.9"/>
    <rect x="450" y="300" width="36" height="300" rx="6" fill="#ffffff" opacity="0.92"/>

    <!-- Film frames (right side) -->
    <rect x="510" y="290" width="100" height="320" rx="4" fill="none" stroke="#ffffff" stroke-width="6"/>
    <rect x="530" y="310" width="60" height="40" rx="2" fill="#ffffff" opacity="0.3"/>
    <rect x="530" y="365" width="60" height="40" rx="2" fill="#ffffff" opacity="0.5"/>
    <rect x="530" y="420" width="60" height="40" rx="2" fill="#ffffff" opacity="0.7"/>
    <rect x="530" y="475" width="60" height="40" rx="2" fill="#ffffff" opacity="0.9"/>
    <rect x="530" y="530" width="60" height="60" rx="2" fill="#ffffff"/>

    <!-- Film sprocket holes -->
    <circle cx="520" cy="330" r="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="520" cy="390" r="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="520" cy="450" r="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="520" cy="510" r="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="520" cy="570" r="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="600" cy="330" r="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="600" cy="390" r="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="600" cy="450" r="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="600" cy="510" r="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="600" cy="570" r="6" fill="#ffffff" opacity="0.4"/>

    <!-- Second film frame, more prominent -->
    <rect x="640" y="280" width="120" height="340" rx="4" fill="none" stroke="#ffffff" stroke-width="6"/>
    <polygon points="680,400 680,500 740,450" fill="#ffffff"/>
    <!-- Sprocket holes -->
    <circle cx="652" cy="320" r="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="652" cy="385" r="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="652" cy="450" r="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="652" cy="515" r="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="652" cy="580" r="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="748" cy="320" r="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="748" cy="385" r="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="748" cy="450" r="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="748" cy="515" r="6" fill="#ffffff" opacity="0.4"/>
    <circle cx="748" cy="580" r="6" fill="#ffffff" opacity="0.4"/>

    <!-- Label -->
    <text x="512" y="750" text-anchor="middle" fill="#ffffff" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="72" font-weight="600" letter-spacing="6">SPEECH</text>
    <text x="512" y="830" text-anchor="middle" fill="#ffffff" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="48" font-weight="300" letter-spacing="4" opacity="0.6">TO VIDEO</text>
  </g>
</svg>